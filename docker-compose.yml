services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_FILE: /data/scoutrr.db
      SCOUTRR_LOG_FILE: /data/scoutrr.log
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    volumes:
      - scoutrr_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3010}:3010"
    restart: unless-stopped

volumes:
  scoutrr_data:
